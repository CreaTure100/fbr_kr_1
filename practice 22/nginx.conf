events {}

http {
    upstream backend_servers {
        server backend1:3001 max_fails=2 fail_timeout=30s;
        server backend2:3002 max_fails=2 fail_timeout=30s;
        server backend_backup:3003 backup;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend_servers;
        }
    }
}